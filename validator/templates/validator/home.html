<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Path Validator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .tagline {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-top: 20px;
        }
        select {
            border: 2px solid #ddd;
            padding: 12px;
            border-radius: 5px;
            width: 100%;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            margin-top: 30px;
            width: 100%;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 Learning Path Validator</h1>
        <p class="tagline">Validate your learning path against real job market data</p>
        
        <form method="POST" action="{% url 'validate' %}">
            {% csrf_token %}
            
            <div>
                <label class="form-label">Select Learning Path</label>
                <select name="learning_path" required>
                    <option value="">-- Choose a path --</option>
                    {% for path in paths %}
                        <option value="{{ path.name }}">{{ path.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label class="form-label">Select Your Region</label>
                <select name="region" required>
                    <option value="">-- Choose a region --</option>
                    {% for region in regions %}
                        <option value="{{ region }}">{{ region }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit">Validate Path</button>
        </form>
    </div>
</body>
</html>
